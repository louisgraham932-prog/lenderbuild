<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" sizes="any" />
    <link rel="icon" href="%PUBLIC_URL%/logo512.png" type="image/png" sizes="512x512" />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1E3A5F" />
    <meta name="msapplication-TileColor" content="#1E3A5F" />
    <meta name="msapplication-TileImage" content="%PUBLIC_URL%/logo512.png" />
    <meta name="description" content="Find private funding for your UK property project or earn returns lending to verified builders. Milestone payments and legal protection built in." />

    <!-- Open Graph -->
    <meta property="og:title" content="LenderBuild — Connect Builders With Property Lenders UK" />
    <meta property="og:description" content="Find private funding for your UK property project or earn returns lending to verified builders. Milestone payments and legal protection built in." />
    <meta property="og:url" content="https://www.lenderbuild.co.uk" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://www.lenderbuild.co.uk/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:site_name" content="LenderBuild" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="LenderBuild — Connect Builders With Property Lenders UK" />
    <meta name="twitter:description" content="Connect UK property builders with private lenders in the UK." />
    <meta name="twitter:image" content="https://www.lenderbuild.co.uk/og-image.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>LenderBuild — UK Property Investment Platform</title>
    <style>@keyframes lb-app-fadein{from{opacity:0}to{opacity:1}}#root{animation:lb-app-fadein 200ms ease forwards}</style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
    <script type="text/javascript">
      (function() {
        var id = "%REACT_APP_CRISP_WEBSITE_ID%";
        if (!id || id === "%REACT_APP_CRISP_WEBSITE_ID%") return;
        window.$crisp = [];
        window.CRISP_WEBSITE_ID = id;
        var d = document, s = d.createElement("script");
        s.src = "https://client.crisp.chat/l.js";
        s.async = 1;
        d.getElementsByTagName("head")[0].appendChild(s);
      })();
    </script>
    <script type="text/javascript">
      (function() {
        try {
          var raw = sessionStorage.getItem("lb_switching");
          if (!raw) return;
          sessionStorage.removeItem("lb_switching");
          var data = JSON.parse(raw);
          var acctName = data.name || "";
          window.__lb_account_switching = true;
          var el = document.createElement("div");
          el.id = "lb-switch-overlay";
          el.style.cssText = "position:fixed;inset:0;z-index:99999;background:#1E3A5F;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;opacity:0;transition:opacity 150ms ease;";
          el.innerHTML =
            '<div style="font-family:\'Playfair Display\',Georgia,serif;font-size:28px;font-weight:700;letter-spacing:-0.5px;">'
            + '<span style="color:#fff">Lender</span><span style="color:#3B82F6">Build</span></div>'
            + '<div style="display:flex;align-items:center;gap:10px;color:rgba(255,255,255,0.75);font-size:15px;">'
            + '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation:lb-spin 0.8s linear infinite"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg>'
            + 'Switching to ' + (acctName ? acctName + '…' : 'account…')
            + '</div>'
            + '<style>@keyframes lb-spin{to{transform:rotate(360deg)}}</style>';
          document.body.appendChild(el);
          requestAnimationFrame(function() { requestAnimationFrame(function() { el.style.opacity = "1"; }); });
        } catch(e) {}
      })();
    </script>
  </body>
</html>
